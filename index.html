<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Site Estilo Cruzeiro</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

<header class="topo">
    <div class="logo">
        <img src="imagens/logo.jpg" alt="Cruzeiro Esporte Clube">
    </div>

    <nav>
        <a href="#">Ingressos</a>
        <a href="#">Loja</a>
        <a href="#" class="btn">Seja Sócio</a>
    </nav>
</header>

<section class="jogos">
    <div class="card" style="background-image: url('imagens/jogo1.jpg');">
        <h4>18 DE ABRIL</h4>
        <p>CRU 2 x 0 GRE</p>
    </div>

    <div class="card destaque" style="background-image: url('imagens/jogo2.jpg');">
        <h4>22 DE ABRIL</h4>
        <p>GOI x CRU</p>
    </div>

    <div class="card" style="background-image: url('imagens/jogo3.jpg');">
        <h4>25 DE ABRIL</h4>
        <p>REM x CRU</p>
    </div>
</section>

<section class="conteudo">
    <h2>CONTEÚDO</h2>

    <div class="grid">
        <div class="post" style="background-image: url('imagens/post1.jpg');">
            <h4>CRUZEIRO 2 x 0 GRE</h4>
        </div>
        <div class="post" style="background-image: url('imagens/post2.jpg');"></div>
        <div class="post" style="background-image: url('imagens/post3.jpg');"></div>
    </div>
</section>

<footer class="rodape">
    <p>© 2026 - Todos os direitos reservados</p>
</footer>

</body>
</html>
